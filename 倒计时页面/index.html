<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五一放假倒计时</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #8bc9ff 0%, #c4e2ff 35%, #fbe7f2 80%, #f9f1fe 100%);
      color: #11213f;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.42), transparent 24%),
                  radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.24), transparent 18%),
                  radial-gradient(circle at 50% 90%, rgba(255, 255, 255, 0.14), transparent 15%);
      pointer-events: none;
      opacity: 0.9;
      animation: skyGlow 16s ease-in-out infinite;
    }

    @keyframes skyGlow {
      0%, 100% { opacity: 0.92; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.01); }
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .container {
      z-index: 1;
      max-width: 980px;
      width: 100%;
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 38px;
      padding: 48px 40px;
      box-shadow: 0 36px 100px rgba(13, 55, 111, 0.18);
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.18), transparent 26%),
                  radial-gradient(circle at 80% 12%, rgba(255, 235, 255, 0.16), transparent 18%);
      pointer-events: none;
    }

    h1 {
      font-size: clamp(3rem, 5vw, 5.2rem);
      line-height: 1.02;
      letter-spacing: -0.06em;
      margin-bottom: 12px;
      color: #1a3058;
      text-shadow: 0 10px 20px rgba(104, 130, 194, 0.16);
    }

    .subtitle {
      font-size: 1.05rem;
      color: #405776;
      margin-bottom: 32px;
      letter-spacing: 0.03em;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .countdown-card {
      position: relative;
      padding: 30px 22px;
      border-radius: 28px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(31, 87, 166, 0.16);
      box-shadow: 0 24px 60px rgba(61, 114, 168, 0.12);
      overflow: hidden;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .countdown-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 70%);
      pointer-events: none;
    }

    .countdown-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 22px 80px rgba(45, 93, 163, 0.18);
    }

    .countdown-number {
      font-size: clamp(3rem, 5vw, 4.6rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      color: #1d2f55;
      margin-bottom: 12px;
      text-shadow: 0 4px 12px rgba(64, 108, 183, 0.14);
    }

    .countdown-label {
      text-transform: uppercase;
      letter-spacing: 0.26em;
      color: #65739d;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .tree {
      position: absolute;
      left: -12%;
      bottom: 0;
      width: 340px;
      height: 320px;
      background: radial-gradient(circle at 35% 35%, rgba(255, 244, 251, 0.96), transparent 35%),
                  radial-gradient(circle at 70% 40%, rgba(255, 225, 245, 0.9), transparent 28%),
                  radial-gradient(circle at 50% 75%, rgba(250, 210, 238, 0.78), transparent 30%);
      filter: blur(0.4px);
      transform: scale(1.05);
      z-index: 0;
    }

    .tree::before {
      content: "";
      position: absolute;
      left: 40%;
      bottom: 0;
      width: 18px;
      height: 220px;
      background: linear-gradient(180deg, #6c4b35, #412d1f);
      border-radius: 14px 14px 18px 18px;
      transform: rotate(-12deg);
    }

    .tree::after {
      content: "";
      position: absolute;
      left: 20%;
      bottom: 150px;
      width: 180px;
      height: 18px;
      background: linear-gradient(90deg, #6c4b35, #442d21);
      border-radius: 999px;
      transform: rotate(-18deg);
    }

    .glow-ring {
      position: absolute;
      border-radius: 50%;
      filter: blur(20px);
      opacity: 0.55;
      animation: drift 18s linear infinite;
    }

    .glow-1 {
      width: 260px;
      height: 260px;
      right: -80px;
      top: 10%;
      background: rgba(252, 186, 233, 0.24);
    }

    .glow-2 {
      width: 340px;
      height: 340px;
      left: -120px;
      bottom: 5%;
      background: rgba(129, 191, 255, 0.18);
      animation-duration: 22s;
    }

    .glow-3 {
      width: 200px;
      height: 200px;
      right: 8%;
      bottom: 16%;
      background: rgba(221, 236, 255, 0.22);
      animation-duration: 20s;
    }

    .petal {
      position: absolute;
      top: -10vh;
      width: 16px;
      height: 18px;
      background: radial-gradient(circle at 50% 35%, #ffe1f0 0%, #ffb0db 48%, #f9d9e9 100%);
      border-radius: 60% 60% 55% 55% / 65% 65% 35% 35%;
      opacity: 0.9;
      transform-origin: center;
      filter: drop-shadow(0 4px 10px rgba(133, 78, 120, 0.18));
      animation: fall 8s linear infinite;
    }

    .petal:nth-of-type(1) { left: 10%; animation-duration: 7s; animation-delay: 0s; }
    .petal:nth-of-type(2) { left: 20%; animation-duration: 10s; animation-delay: 1.2s; }
    .petal:nth-of-type(3) { left: 30%; animation-duration: 9.2s; animation-delay: 0.6s; }
    .petal:nth-of-type(4) { left: 45%; animation-duration: 8.5s; animation-delay: 1.1s; }
    .petal:nth-of-type(5) { left: 55%; animation-duration: 7.8s; animation-delay: 0.3s; }
    .petal:nth-of-type(6) { left: 65%; animation-duration: 9.6s; animation-delay: 1.8s; }
    .petal:nth-of-type(7) { left: 75%; animation-duration: 8.9s; animation-delay: 0.8s; }
    .petal:nth-of-type(8) { left: 82%; animation-duration: 11s; animation-delay: 1.4s; }
    .petal:nth-of-type(9) { left: 92%; animation-duration: 7.6s; animation-delay: 0.5s; }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.9; }
      50% { transform: translateY(45vh) rotate(180deg); opacity: 0.95; }
      100% { transform: translateY(95vh) rotate(340deg); opacity: 0; }
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-14px, 18px) scale(1.04); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @media (max-width: 740px) {
      .container {
        padding: 32px 24px;
      }
      .countdown {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }

    @media (max-width: 460px) {
      .countdown {
        grid-template-columns: 1fr;
      }
      .subtitle {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="tree"></div>
    <div class="glow-ring glow-1"></div>
    <div class="glow-ring glow-2"></div>
    <div class="glow-ring glow-3"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>

    <div class="container">
      <h1>五一放假倒计时</h1>
      <div class="subtitle">倒数到 2027 年 5 月 1 日，愿劳动节也能有诗意的假期气息。</div>
      <div class="countdown">
        <div class="countdown-card">
          <div id="days" class="countdown-number">00</div>
          <div class="countdown-label">天</div>
        </div>
        <div class="countdown-card">
          <div id="hours" class="countdown-number">00</div>
          <div class="countdown-label">小时</div>
        </div>
        <div class="countdown-card">
          <div id="minutes" class="countdown-number">00</div>
          <div class="countdown-label">分钟</div>
        </div>
        <div class="countdown-card">
          <div id="seconds" class="countdown-number">00</div>
          <div class="countdown-label">秒</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const targetDate = new Date('2027-05-01T00:00:00');

    const elements = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };

    function format(value) {
      return value.toString().padStart(2, '0');
    }

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        elements.days.textContent = '00';
        elements.hours.textContent = '00';
        elements.minutes.textContent = '00';
        elements.seconds.textContent = '00';
        return;
      }

      const seconds = Math.floor(diff / 1000) % 60;
      const minutes = Math.floor(diff / (1000 * 60)) % 60;
      const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      elements.days.textContent = format(days);
      elements.hours.textContent = format(hours);
      elements.minutes.textContent = format(minutes);
      elements.seconds.textContent = format(seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
