<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐾 汪宇宙 — 狗狗星球</title>
  <style>
    /* ── 全局 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #3b0764 0%, #6d28d9 40%, #9333ea 70%, #c026d3 100%);
      padding: 48px 16px 64px;
    }

    /* ── 星星背景装饰 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 60px 60px, 30px 30px;
      background-position: 0 0, 15px 15px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .site-header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 52px;
    }

    .site-header .badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fde68a;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      padding: 4px 16px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .site-header h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,0.3);
      line-height: 1.1;
    }

    .site-header h1 span {
      background: linear-gradient(90deg, #fbbf24, #fb923c, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-header p {
      margin-top: 12px;
      color: rgba(255,255,255,0.75);
      font-size: 1.05rem;
    }

    /* ── 卡片网格 ── */
    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── 卡片包裹层（含上传按钮区） ── */
    .card-wrapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── 上传按钮区（位于卡片正上方） ── */
    .upload-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    /* 上传栏内的按钮共用基础样式 */
    .upload-bar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border-radius: 999px;
      border: 1.5px dashed rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.22s ease, border-color 0.22s ease, transform 0.18s ease;
      letter-spacing: 0.03em;
    }

    .upload-bar-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.9);
      transform: scale(1.04);
    }

    .upload-bar-btn:active {
      transform: scale(0.97);
    }

    /* 上传成功后按钮变为"已更换"提示样式 */
    .upload-btn.uploaded {
      border-color: rgba(134, 239, 172, 0.7);
      background: rgba(134, 239, 172, 0.18);
      color: #bbf7d0;
    }

    /* "恢复默认"按钮：仅在已上传自定义图片时显示 */
    .reset-btn {
      border-color: rgba(252, 165, 165, 0.6);
      background: rgba(252, 165, 165, 0.12);
      color: #fecaca;
      display: none;
    }

    .reset-btn:hover {
      background: rgba(252, 165, 165, 0.28);
      border-color: rgba(252, 165, 165, 0.9);
    }

    /* 隐藏的文件输入框 */
    .file-input { display: none; }

    /* ── 单张卡片 ── */
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.18),
        0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.32s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.32s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.025);
      box-shadow:
        0 24px 56px rgba(0,0,0,0.28),
        0 4px 16px rgba(0,0,0,0.14);
    }

    /* ── 图片展示区 ── */
    .card-img-wrap {
      position: relative;
      height: 200px;
      overflow: hidden;
      background: #f3f4f6;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transition: transform 0.45s ease;
      display: block;
    }

    .card:hover .card-img-wrap img {
      transform: scale(1.07);
    }

    /* 图片加载中的 loading 遮罩（层级最高，覆盖轮播控件） */
    .img-loading-mask {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(3px);
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      z-index: 10;
    }

    /* 品种标签 */
    .breed-tag {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(6px);
      color: #7c3aed;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      z-index: 2;
    }

    /* 爱心按钮 */
    .heart-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease;
      border: none;
      outline: none;
      z-index: 2;
    }

    .heart-btn:hover { transform: scale(1.25); }
    .heart-btn.liked { background: #fce7f3; }

    /* ── 轮播：左右切换按钮 ── */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(6px);
      border: none;
      cursor: pointer;
      display: none;              /* 默认隐藏，多张图时显示 */
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: #374151;
      z-index: 3;
      transition: background 0.2s ease, transform 0.2s ease;
      user-select: none;
      line-height: 1;
    }

    .carousel-prev { left: 9px; }
    .carousel-next { right: 9px; }

    .carousel-prev:hover { background: #fff; transform: translateY(-50%) scale(1.12); }
    .carousel-next:hover { background: #fff; transform: translateY(-50%) scale(1.12); }

    /* ── 轮播：当前张数指示器 ── */
    .carousel-counter {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.48);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 11px;
      border-radius: 999px;
      display: none;              /* 默认隐藏，多张图时显示 */
      z-index: 3;
      white-space: nowrap;
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    /* ── 轮播：切换时的淡入动画 ── */
    @keyframes imgFadeIn {
      from { opacity: 0.15; }
      to   { opacity: 1; }
    }

    .card-img-wrap img.is-switching {
      animation: imgFadeIn 0.3s ease forwards;
    }

    /* ── 内容区 ── */
    .card-body {
      padding: 20px 22px 24px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .dog-name {
      font-size: 1.35rem;
      font-weight: 800;
      color: #1e1b4b;
    }

    .dog-age {
      display: flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #fde68a, #fb923c);
      color: #78350f;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .dog-desc {
      font-size: 0.88rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    /* 性格标签 */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .tag-orange { background: #fff7ed; color: #ea580c; }
    .tag-pink   { background: #fdf2f8; color: #db2777; }
    .tag-purple { background: #f5f3ff; color: #7c3aed; }
    .tag-green  { background: #f0fdf4; color: #16a34a; }
    .tag-blue   { background: #eff6ff; color: #2563eb; }
    .tag-rose   { background: #fff1f2; color: #e11d48; }

    /* 底部分隔线 + 互动数 */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #f3f4f6;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .card-footer .paw { font-size: 1rem; margin-right: 3px; }

    /* ── 底部 ── */
    .site-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 60px;
      color: rgba(255,255,255,0.5);
      font-size: 0.82rem;
    }

    /* ── 响应式 ── */
    @media (max-width: 480px) {
      .card-img-wrap { height: 180px; }
      .card-body { padding: 16px 18px 20px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="badge">🌌 欢迎来到</div>
    <h1>汪<span>宇宙</span> 🐾</h1>
    <p>每一只狗狗，都是独一无二的小星球</p>

  <!-- 卡片网格 -->
  <main class="grid" id="cardGrid"></main>

  <!-- Footer -->
  <footer class="site-footer">

  </footer>

  <script>
    /* ─────────────────────────────────────────
     * 狗狗数据
     * ───────────────────────────────────────── */
    const dogs = [
      {
        name: "豆豆",

        tags: [{ text: "活泼好动", cls: "tag-orange" }, { text: "傲娇", cls: "tag-purple" }, { text: "爱运动", cls: "tag-green" }],

        tags: [{ text: "贪吃可爱", cls: "tag-orange" }, { text: "开朗", cls: "tag-green" }, { text: "爱笑", cls: "tag-pink" }],
        img: "https://images.unsplash.com/photo-1601979031925-424e53b6caaa?w=600&q=80",
        likes: 312,
        paws: "7.1k"
      },
      {
        name: "球球",
        age: "4 岁",
        breed: "哈士奇",
        desc: "外表是雪山守卫，内心是碎碎念的话痨。每天必须跟主人汇报今天的所见所闻。",
        tags: [{ text: "话唠", cls: "tag-blue" }, { text: "忠诚", cls: "tag-purple" }, { text: "戏精", cls: "tag-rose" }],

        tags: [{ text: "调皮捣蛋", cls: "tag-orange" }, { text: "精力充沛", cls: "tag-green" }, { text: "夜猫子", cls: "tag-blue" }],
        img: "https://images.unsplash.com/photo-1575425186775-b8de9a427e67?w=600&q=80",

      },
      {
        name: "椰子",
        age: "6 岁",
        breed: "萨摩耶",
        desc: "人生哲学只有一条：能躺着绝不坐着。毛茸茸的大笑脸能治愈世间一切烦恼。",
        tags: [{ text: "慵懒", cls: "tag-purple" }, { text: "治愈系", cls: "tag-pink" }, { text: "爱午睡", cls: "tag-blue" }],
        img: "https://images.unsplash.com/photo-1612502169027-5ad6d7082cc7?w=600&q=80",
        likes: 441,
        paws: "9.3k"
      },
    ];

    /* ─────────────────────────────────────────
     * 图片裁剪工具函数（callback 版）
     * ───────────────────────────────────────── */
    function cropToCanvas(file, targetW, targetH, onDone) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const scale  = Math.max(targetW / img.width, targetH / img.height);
          const scaledW = img.width  * scale;
          const scaledH = img.height * scale;
          const srcX = (scaledW - targetW) / 2 / scale;
          const srcY = (scaledH - targetH) / 2 / scale;
          const srcW = targetW / scale;
          const srcH = targetH / scale;
          const canvas = document.createElement('canvas');
          canvas.width  = targetW;
          canvas.height = targetH;
          canvas.getContext('2d').drawImage(img, srcX, srcY, srcW, srcH, 0, 0, targetW, targetH);
          onDone(canvas.toDataURL('image/jpeg', 0.92));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    /* cropToCanvas 的 Promise 包装，方便并行处理多张图 */
    function cropToCanvasAsync(file, targetW, targetH) {
      return new Promise(resolve => cropToCanvas(file, targetW, targetH, resolve));
    }

    /* ─────────────────────────────────────────
     * localStorage 持久化工具
     *
     * 升级为数组存储（JSON），同时向下兼容旧版
     * 单张字符串格式，Key：wang_img_{idx}
     * ───────────────────────────────────────── */
    const STORAGE_PREFIX = 'wang_img_';

    const storage = {
      /**
       * 将图片 dataURL 数组持久化到 localStorage。
       * @param {number}   idx     - 狗狗索引
       * @param {string[]} dataURLs - 裁剪后的 JPEG dataURL 数组
       */
      save(idx, dataURLs) {
        try {
          localStorage.setItem(STORAGE_PREFIX + idx, JSON.stringify(dataURLs));
        } catch (err) {
          alert('📦 照片保存失败：浏览器本地存储空间已满，请清理后重试。');
          console.warn('[汪宇宙] localStorage 写入失败', err);
        }
      },

      /**
       * 读取已保存的 dataURL 数组。
       * 兼容旧格式（单张字符串），统一返回数组或 null。
       * @param  {number} idx
       * @returns {string[]|null}
       */
      load(idx) {
        const raw = localStorage.getItem(STORAGE_PREFIX + idx);
        if (!raw) return null;
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [parsed]; // 兼容旧单张格式
        } catch {
          return [raw]; // 旧版未经 JSON.stringify 的裸字符串
        }
      },

      /** 删除指定卡片的自定义图片。 */
      remove(idx) {
        localStorage.removeItem(STORAGE_PREFIX + idx);
      },
    };

    /* ─────────────────────────────────────────
     * 卡片渲染
     * ───────────────────────────────────────── */
    const grid = document.getElementById('cardGrid');
    const IMG_W = 300;
    const IMG_H = 200;

    dogs.forEach((dog, idx) => {

      /* ── 外层包裹：上传按钮 + 卡片 ── */
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      /* ── 上传按钮区 ── */
      const uploadBar = document.createElement('div');
      uploadBar.className = 'upload-bar';

      const uploadBtn = document.createElement('button');
      uploadBtn.className = 'upload-bar-btn upload-btn';
      uploadBtn.setAttribute('aria-label', `为${dog.name}选择照片`);
      uploadBtn.innerHTML = '📷 选择照片';

      /* multiple 属性：允许一次选择多张图片 */
      const fileInput = document.createElement('input');
      fileInput.type     = 'file';
      fileInput.accept   = 'image/*';
      fileInput.multiple = true;          // ← 支持多选
      fileInput.className = 'file-input';

      const resetBtn = document.createElement('button');
      resetBtn.className = 'upload-bar-btn reset-btn';
      resetBtn.setAttribute('aria-label', `恢复${dog.name}的默认照片`);
      resetBtn.innerHTML = '🗑 恢复默认';

      uploadBar.appendChild(uploadBtn);
      uploadBar.appendChild(resetBtn);
      uploadBar.appendChild(fileInput);

      /* ── 卡片本体 ── */
      const card = document.createElement('div');
      card.className = 'card';

      const tagHTML = dog.tags.map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join('');

      card.innerHTML = `
        <div class="card-img-wrap">
          <img src="${dog.img}" alt="${dog.name}" loading="lazy" />
          <div class="img-loading-mask" aria-hidden="true">⏳</div>
          <span class="breed-tag">${dog.breed}</span>
          <button class="heart-btn" data-idx="${idx}" aria-label="点赞">🤍</button>
          <!-- 轮播：左右切换按钮 -->
          <button class="carousel-btn carousel-prev" aria-label="上一张">‹</button>
          <button class="carousel-btn carousel-next" aria-label="下一张">›</button>
          <!-- 轮播：张数指示器 -->
          <div class="carousel-counter"></div>
        </div>
        <div class="card-body">
          <div class="card-top">
            <span class="dog-name">${dog.name}</span>
            <span class="dog-age">🐾 ${dog.age}</span>
          </div>
          <p class="dog-desc">${dog.desc}</p>
          <div class="tags">${tagHTML}</div>
          <div class="card-footer">
            <span><span class="paw">🐾</span>${dog.paws} 足迹</span>
            <span id="likes-${idx}">❤️ ${dog.likes}</span>
          </div>
        </div>
      `;

      /* 取到关键 DOM 元素 */
      const imgWrap  = card.querySelector('.card-img-wrap');
      const cardImg  = card.querySelector('img');
      const loadMask = card.querySelector('.img-loading-mask');
      const prevBtn  = card.querySelector('.carousel-prev');
      const nextBtn  = card.querySelector('.carousel-next');
      const counter  = card.querySelector('.carousel-counter');

      /* ── 每张卡片独立的轮播状态 ── */
      let customImages = [];   // 用户上传的图片 dataURL 数组
      let currentSlide = 0;
      let autoTimer    = null;

      /* 停止自动播放 */
      function stopAutoPlay() {
        if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
      }

      /* 开始自动播放：有 2+ 张图时每 3 秒自动切换 */
      function startAutoPlay() {
        stopAutoPlay();
        if (customImages.length > 1) {
          autoTimer = setInterval(() => showSlide(currentSlide + 1), 3000);
        }
      }

      /**
       * 显示第 n 张图，并同步更新轮播 UI。
       * @param {number}  n       - 目标索引（支持越界，自动循环）
       * @param {boolean} animate - 是否播放淡入动画（默认 true）
       */
      function showSlide(n, animate = true) {
        const imgs = customImages.length > 0 ? customImages : [dog.img];
        currentSlide = (n + imgs.length) % imgs.length;

        /* 切换图片，有多张时加淡入动画 */
        if (animate && imgs.length > 1) {
          cardImg.classList.remove('is-switching');
          void cardImg.offsetWidth;           // 强制重绘，保证动画每次触发
          cardImg.src = imgs[currentSlide];
          cardImg.classList.add('is-switching');
        } else {
          cardImg.classList.remove('is-switching');
          cardImg.src = imgs[currentSlide];
        }

        /* 多张图才显示轮播控件 */
        const multi = imgs.length > 1;
        prevBtn.style.display  = multi ? 'flex'  : 'none';
        nextBtn.style.display  = multi ? 'flex'  : 'none';
        counter.style.display  = multi ? 'block' : 'none';
        if (multi) counter.textContent = `${currentSlide + 1} / ${imgs.length}`;
      }

      /* 切换上传按钮文案及"恢复默认"按钮的可见性 */
      function setUploadBtnState(hasCustom) {
        uploadBtn.innerHTML = hasCustom ? '📷 更换照片' : '📷 选择照片';
        resetBtn.style.display = hasCustom ? 'inline-flex' : 'none';
      }

      /* ── 初始化：从 localStorage 恢复已保存图片 ── */
      const saved = storage.load(idx);
      if (saved) {
        customImages = saved;
        showSlide(0, false);       // 直接显示，不播动画
        setUploadBtnState(true);
        startAutoPlay();
      }

      /* ── 悬停图片区时暂停自动播放，离开后恢复 ── */
      imgWrap.addEventListener('mouseenter', stopAutoPlay);
      imgWrap.addEventListener('mouseleave', () => {
        if (customImages.length > 1) startAutoPlay();
      });

      /* ── 左切换按钮 ── */
      prevBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showSlide(currentSlide - 1);
        startAutoPlay();             // 手动切换后重置计时器
      });

      /* ── 右切换按钮 ── */
      nextBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showSlide(currentSlide + 1);
        startAutoPlay();
      });

      /* ── 点击"选择照片"→ 触发隐藏 input ── */
      uploadBtn.addEventListener('click', () => {
        fileInput.value = ''; // 清空，确保同一组文件可重复选择
        fileInput.click();
      });

      /* ── 用户选好文件后处理（支持多张并行裁剪） ── */
      fileInput.addEventListener('change', async () => {
        const files = Array.from(fileInput.files).filter(f => f.type.startsWith('image/'));
        if (!files.length) return;

        /* 显示 loading 遮罩 */
        loadMask.style.display = 'flex';

        /* 并行裁剪所有选中图片 */
        const dataURLs = await Promise.all(
          files.map(f => cropToCanvasAsync(f, IMG_W, IMG_H))
        );

        /* 更新状态、界面、存储 */
        customImages = dataURLs;
        showSlide(0, false);
        storage.save(idx, dataURLs);
        startAutoPlay();

        /* 隐藏 loading 遮罩 */
        loadMask.style.display = 'none';

        /* 反馈：多张时显示张数 */
        const countTip = files.length > 1 ? ` (${files.length}张)` : '';
        uploadBtn.innerHTML = `✅ 已更换${countTip}`;
        uploadBtn.classList.add('uploaded');
        resetBtn.style.display = 'inline-flex';

        setTimeout(() => {
          uploadBtn.innerHTML = '📷 更换照片';
          uploadBtn.classList.remove('uploaded');
        }, 3000);
      });

      /* ── "恢复默认"→ 清除存储，重置为原始图 ── */
      resetBtn.addEventListener('click', () => {
        storage.remove(idx);
        customImages = [];
        currentSlide = 0;
        stopAutoPlay();
        showSlide(0, false);      // 显示默认图，隐藏轮播控件
        setUploadBtnState(false);
      });

      /* 组装 DOM */
      wrapper.appendChild(uploadBar);
      wrapper.appendChild(card);
      grid.appendChild(wrapper);
    });

    /* ─────────────────────────────────────────
     * 点赞交互（事件委托）
     * ───────────────────────────────────────── */
    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('.heart-btn');
      if (!btn) return;

      e.stopPropagation();
      const idx   = btn.dataset.idx;
      const liked = btn.classList.toggle('liked');

      btn.textContent = liked ? '❤️' : '🤍';

      const likeEl  = document.getElementById(`likes-${idx}`);
      const current = parseInt(likeEl.textContent.replace(/\D/g, ''), 10);
      likeEl.textContent = `❤️ ${liked ? current + 1 : current - 1}`;
    });
  </script>
</body>
</html>
